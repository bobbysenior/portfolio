<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Thomas — Portfolio</title>
        <style>
            :root {
                --bg: #0a0a0a;
                --fg: #f2f2f2;
                --muted: #888;
                --accent: #fff;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 100%;
                min-height: 100%;
            }
            body {
                background: var(--bg);
                color: var(--fg);
                font-family: "Times New Roman", "STIX Two Math", serif;
                -webkit-font-smoothing: antialiased;
            }

            /* ---------- Écran de chargement ---------- */
            #loader {
                position: fixed;
                inset: 0;
                background: #000;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                z-index: 100;
                transition: opacity 0.8s ease;
            }
            #loader.done {
                opacity: 0;
                pointer-events: none;
            }
            #stage {
                width: min(70vmin, 500px);
                height: min(70vmin, 500px);
            }

            /* ---------- Contenu du portfolio ---------- */
            #content {
                opacity: 0;
                transition: opacity 1s ease 0.3s;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }
            #content.visible {
                opacity: 1;
            }

            header {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 2rem;
            }
            header .mark {
                font-size: clamp(3rem, 12vmin, 6rem);
                line-height: 1;
                margin-bottom: 1.5rem;
            }
            header h1 {
                font-size: clamp(2rem, 6vw, 3.5rem);
                font-weight: normal;
                letter-spacing: 0.02em;
            }
            header p.tagline {
                color: var(--muted);
                font-size: clamp(1rem, 2.5vw, 1.25rem);
                margin-top: 0.75rem;
                max-width: 40ch;
            }

            nav {
                display: flex;
                gap: 2rem;
                justify-content: center;
                flex-wrap: wrap;
                margin-top: 2.5rem;
            }
            nav a {
                color: var(--fg);
                text-decoration: none;
                font-size: 1.1rem;
                padding-bottom: 2px;
                border-bottom: 1px solid transparent;
                transition:
                    border-color 0.25s ease,
                    opacity 0.25s ease;
            }
            nav a:hover {
                border-color: var(--accent);
            }
            nav a.disabled {
                color: var(--muted);
                pointer-events: none;
            }
            nav a.disabled::after {
                content: " (bientôt)";
                font-size: 0.8em;
                color: var(--muted);
            }

            footer {
                text-align: center;
                padding: 1.5rem;
                color: var(--muted);
                font-size: 0.9rem;
            }
        </style>
    </head>
    <body>
        <!-- ===================== Loader (animation ℵ₀) ===================== -->
        <div id="loader">
            <div id="stage">
                <svg
                    id="svg"
                    viewBox="0 0 400 400"
                    xmlns="http://www.w3.org/2000/svg"
                ></svg>
            </div>
        </div>

        <!-- ===================== Contenu ===================== -->
        <main id="content">
            <header>
                <div class="mark">&#8501;<sub>0</sub></div>
                <h1>al3ph_zero</h1>
                <p class="tagline">Portfolio — en construction.</p>
                <nav>
                    <a href="#about">À propos</a>
                    <a href="#projects">Projets</a>
                    <a class="disabled" href="#blog">Blog</a>
                    <a href="mailto:bobby@gmail.com">Contact</a>
                </nav>
            </header>

            <footer>&copy; <span id="year"></span> Thomas</footer>
        </main>

        <script>
            /* ---------------- Animation de chargement (façon Manim "Write") ---------------- */
            const ALEPH = "ℵ"; // ℵ
            const ZERO = "₀"; // ₀

            const NS = "http://www.w3.org/2000/svg";
            const svg = document.getElementById("svg");

            function makeStrokedText(ch, size, x, y) {
                const t = document.createElementNS(NS, "text");
                t.setAttribute("x", x);
                t.setAttribute("y", y);
                t.setAttribute(
                    "font-family",
                    "'Times New Roman', 'STIX Two Math', serif",
                );
                t.setAttribute("font-size", size);
                t.setAttribute("fill", "#fff");
                t.setAttribute("stroke", "#fff");
                t.setAttribute("stroke-width", "1.2");
                t.setAttribute("stroke-linejoin", "round");
                t.setAttribute("stroke-linecap", "round");
                t.setAttribute("text-anchor", "middle");
                t.textContent = ch;
                return t;
            }

            const aleph = makeStrokedText(ALEPH, 230, 175, 250);
            const zero = makeStrokedText(ZERO, 230, 285, 300);
            svg.appendChild(aleph);
            svg.appendChild(zero);

            function setupDash(el) {
                const box = el.getBBox();
                const dash = (box.width + box.height) * 3;
                el.style.strokeDasharray = dash;
                el.style.strokeDashoffset = dash;
                el.style.fillOpacity = 0;
                return dash;
            }

            function animate(
                el,
                dash,
                { drawTime, fillStart, fillTime, delay },
                onEnd,
            ) {
                const start = performance.now() + delay;
                function frame(now) {
                    const t = now - start;
                    if (t < 0) {
                        requestAnimationFrame(frame);
                        return;
                    }
                    const dp = Math.min(t / drawTime, 1);
                    const e = dp < 0.5 ? 2 * dp * dp : -1 + (4 - 2 * dp) * dp; // easeInOut
                    el.style.strokeDashoffset = dash * (1 - e);
                    if (t > fillStart) {
                        const fp = Math.min((t - fillStart) / fillTime, 1);
                        el.style.fillOpacity = fp;
                    }
                    if (dp < 1 || t - fillStart < fillTime) {
                        requestAnimationFrame(frame);
                    } else if (onEnd) {
                        onEnd();
                    }
                }
                requestAnimationFrame(frame);
            }

            function reveal() {
                const loader = document.getElementById("loader");
                const content = document.getElementById("content");
                loader.classList.add("done");
                content.classList.add("visible");
                setTimeout(() => loader.remove(), 900);
            }

            function run() {
                const dA = setupDash(aleph);
                const dZ = setupDash(zero);
                animate(aleph, dA, {
                    drawTime: 2200,
                    fillStart: 1400,
                    fillTime: 1400,
                    delay: 200,
                });
                // le ₀ termine en dernier -> on déclenche la révélation à sa fin
                animate(
                    zero,
                    dZ,
                    {
                        drawTime: 2200,
                        fillStart: 1400,
                        fillTime: 1400,
                        delay: 350,
                    },
                    () => setTimeout(reveal, 500),
                );
            }

            document.getElementById("year").textContent =
                new Date().getFullYear();

            if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(run);
            } else {
                window.addEventListener("load", run);
            }
        </script>
    </body>
</html>
